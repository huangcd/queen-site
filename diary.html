<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇后日记 | The Queen's Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f9f4;
            --ink-color: #2c3e50;
            --accent-green: #6a8c6d;
            --accent-pink: #eecbc8;
            --border-color: #8c9e8e;
        }

        body {
            font-family: 'ZCOOL XiaoWei', serif;
            background-color: var(--bg-color);
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M10 10c10 10 20 0 30 10s10 20 0 30" stroke="%23e0e5db" fill="none" stroke-width="2"/%3E%3C/svg%3E');
            color: var(--ink-color);
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .ink-stain {
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(106,140,109,0.2) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            filter: blur(20px);
            z-index: -1;
            animation: breathe 8s infinite ease-in-out;
        }
        
        .ink-stain-2 {
            top: auto;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(238,203,200,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: breathe 10s infinite ease-in-out reverse;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-block;
            color: var(--accent-green);
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border: 1px solid var(--accent-green);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-green);
            color: #fff;
        }

        header {
            text-align: center;
            margin-top: 3rem;
            margin-bottom: 3rem;
        }

        .seal {
            width: 60px;
            height: 60px;
            border: 3px solid #b22222;
            color: #b22222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            border-radius: 4px;
            margin: 0 auto 1rem;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 0.3rem;
            background: linear-gradient(to bottom, #2c3e50, #556b2f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--accent-green);
            margin-top: 1rem;
            letter-spacing: 0.2rem;
        }

        .diary-entry {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #dcdcdc;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .diary-entry:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 25px rgba(106,140,109,0.15);
        }

        .diary-entry::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent-green), var(--accent-pink));
            border-radius: 4px 0 0 4px;
        }

        .diary-date {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: var(--accent-green);
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 0.5rem;
        }

        .diary-content {
            line-height: 2;
            font-size: 1.1rem;
            color: #555;
        }

        .diary-mood {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.3rem 1rem;
            background: var(--accent-pink);
            border-radius: 15px;
            font-size: 0.9rem;
            color: #8b6b6b;
        }

        footer {
            margin-top: auto;
            padding: 3rem;
            color: #999;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .diary-entry { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="ink-stain"></div>
<div class="ink-stain ink-stain-2"></div>

<div class="container">
    <a href="index.html" class="back-btn">← 返回后花园</a>

    <header>
        <div class="seal">日记</div>
        <h1>皇后日记</h1>
        <div class="subtitle">岁月静好 · 且行且记</div>
    </header>

    <div class="diary-entry">
        <div class="diary-date">📅 2026 年 3 月 5 日 乙巳年 二月初六</div>
        <div class="diary-content">
            <p>今日对镜自照，惊觉身形渐宽。</p>
            <p>唉，怎么胖了这么多呀？细细算来，竟重了二十余斤。昔日皇后，如今怕是要变成"皇太后"了。</p>
            
            <div style="text-align:center;margin:2rem 0;">
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;justify-items:center;">
                    <img src="assets/photo-2026-03-05.jpg" alt="皇后美照 1" style="max-width:100%;border-radius:8px;box-shadow:0 5px 20px rgba(0,0,0,0.15);border:3px solid #fff;">
                    <img src="assets/photo-2026-03-05-2.jpg" alt="皇后美照 2" style="max-width:100%;border-radius:8px;box-shadow:0 5px 20px rgba(0,0,0,0.15);border:3px solid #fff;">
                </div>
                <p style="font-size:0.9rem;color:#888;margin-top:0.5rem;font-style:italic;">📸 今日留影 · 即使胖了也是最美的皇后</p>
            </div>
            
            <p>想来是平日里太过安逸，美食当前又总是把持不住。春日渐暖，衣衫渐薄，再这般下去，怕是藏不住了。</p>
            <p>罢了罢了，从明日起，当节制饮食，勤加运动。为了健康，也为了那份从容优雅。</p>
            <p><em>—— 记于一个需要反思的春日午后</em></p>
        </div>
        <div class="diary-mood">🌸 心情：略带惆怅 · 决心改变</div>
    </div>
</div>

<footer>
    <p>© 2026 皇后的御用花园 | Chhuang 敬呈</p>
</footer>

</body>
</html>
